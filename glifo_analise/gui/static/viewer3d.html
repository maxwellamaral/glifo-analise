<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizador 3D Tátil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #canvas-container { width: 100vw; height: 100vh; }

    /* ── Placeholder central ── */
    #placeholder {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #4a5568;
      text-align: center;
      font-size: 13px;
      pointer-events: none;
      line-height: 1.8;
    }
    #placeholder .icon { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.4; }

    /* ── Loading spinner ── */
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #63b3ed;
      font-size: 13px;
      display: none;
      text-align: center;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2d3748;
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Barra de informações inferior ── */
    #info-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 6px 12px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #718096;
    }
    #model-name { color: #90cdf4; font-weight: 600; }

    /* ── Barra de ferramentas superior ── */
    #toolbar {
      position: absolute;
      top: 10px; right: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .tb-btn {
      background: rgba(26, 32, 44, 0.85);
      border: 1px solid #2d3748;
      border-radius: 6px;
      color: #a0aec0;
      padding: 6px 10px;
      font-size: 11px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .tb-btn:hover { background: #2d3748; color: #fff; }
    .tb-btn.active { background: rgba(99,179,237,0.15); border-color: #63b3ed; color: #90cdf4; }
    .tb-sep { width: 100%; height: 1px; background: #2d3748; margin: 2px 0; }
    .tb-label { font-size: 10px; color: #4a5568; padding: 2px 4px; text-transform: uppercase; letter-spacing: .06em; }

    /* ── Painel de dimensões ── */
    #dims-panel {
      position: absolute;
      top: 10px; left: 10px;
      background: rgba(26, 32, 44, 0.85);
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: #718096;
      backdrop-filter: blur(4px);
      display: none;
      line-height: 1.9;
    }
    #dims-panel span { color: #90cdf4; font-weight: 600; }

    /* ── Erro ── */
    #error-msg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fc8181;
      font-size: 13px;
      text-align: center;
      display: none;
    }
  </style>

  <!-- Three.js e addons servidos localmente (sem dependência de CDN externo) -->
  <script type="importmap">
  {
    "imports": {
      "three": "/static/three/three.module.js",
      "three/addons/controls/OrbitControls.js": "/static/three/OrbitControls.js",
      "three/addons/loaders/STLLoader.js":       "/static/three/STLLoader.js",
      "three/addons/loaders/3MFLoader.js":       "/static/three/ThreeMFLoader.js"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="placeholder">
    <span class="icon">🖨</span>
    Gere um modelo 3D para<br>visualizá-lo aqui
  </div>

  <div id="loading">
    <div class="spinner"></div>
    Carregando modelo…
  </div>

  <div id="error-msg">❌ Falha ao carregar o modelo</div>

  <div id="dims-panel">
    Dimensões:<br>
    X&nbsp;<span id="dim-x">—</span> mm&nbsp;&nbsp;
    Y&nbsp;<span id="dim-y">—</span> mm&nbsp;&nbsp;
    Z&nbsp;<span id="dim-z">—</span> mm
  </div>

  <div id="toolbar">
    <button class="tb-btn" id="btn-reset">⟳ Resetar câmera</button>
    <button class="tb-btn" id="btn-wire">◻ Wireframe</button>
    <button class="tb-btn" id="btn-top">⬆ Vista superior</button>
    <button class="tb-btn" id="btn-front">⬛ Vista frontal</button>
    <button class="tb-btn" id="btn-fs">⤢ Tela cheia</button>
    <div class="tb-sep"></div>
    <span class="tb-label">Iluminação</span>
    <button class="tb-btn tb-light active" id="lp-padrao">⬟ Padrão</button>
    <button class="tb-btn tb-light" id="lp-studio">◎ Studio</button>
    <button class="tb-btn tb-light" id="lp-rasante">◈ Rasante</button>
    <button class="tb-btn tb-light" id="lp-dramatico">◐ Dramático</button>
  </div>

  <div id="info-bar">
    <span id="model-name">—</span>
    <span>Arrastar: girar &nbsp;|&nbsp; Scroll: zoom &nbsp;|&nbsp; Botão direito: transladar</span>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { STLLoader }    from 'three/addons/loaders/STLLoader.js';
    import { ThreeMFLoader } from 'three/addons/loaders/3MFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Cena ────────────────────────────────────────────────────────────────
    const container  = document.getElementById('canvas-container');
    const placeholder = document.getElementById('placeholder');
    const loadingEl   = document.getElementById('loading');
    const errorEl     = document.getElementById('error-msg');
    const dimsPanel   = document.getElementById('dims-panel');
    const modelNameEl = document.getElementById('model-name');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1117);
    scene.fog = new THREE.FogExp2(0x0f1117, 0.008);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.01,
      5000
    );
    camera.position.set(60, 60, 100);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Headlight: ponto de luz acoplado à câmera — garante que o modelo
    // nunca fique completamente negro independente do ângulo de visão
    const headLight = new THREE.PointLight(0xffffff, 0.6, 0);
    camera.add(headLight);
    scene.add(camera);  // câmera precisa estar na cena para a luz funcionar

    // ── Iluminação ──────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.4);
    dir1.position.set(80, 120, 60);
    dir1.castShadow = true;
    dir1.shadow.mapSize.set(1024, 1024);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0x6699ff, 0.5);
    dir2.position.set(-60, -30, -80);
    scene.add(dir2);

    const hemiLight = new THREE.HemisphereLight(0x223366, 0x0f1117, 0.4);
    scene.add(hemiLight);

    // ── Presets de iluminação ────────────────────────────────────────────────
    const LIGHT_PRESETS = {
      padrao:   { amb: 0.8,  d1i: 1.4, d1p: [80,  120,  60], d1c: 0xffffff,
                             d2i: 0.5, d2p: [-60, -30, -80], d2c: 0x6699ff, hemi: 0.5 },
      studio:   { amb: 1.2,  d1i: 1.0, d1p: [0,   200,   0], d1c: 0xffffff,
                             d2i: 0.8, d2p: [0,  -200,   0], d2c: 0xffffff, hemi: 0.8 },
      // Luz rasante: incide de lado a baixo ângulo — realça relevo dos pinos
      rasante:  { amb: 0.5,  d1i: 3.0, d1p: [300,  15,   0], d1c: 0xfff8e7,
                             d2i: 0.3, d2p: [0,    80, 200], d2c: 0x4466cc, hemi: 0.3 },
      dramatico:{ amb: 0.4,  d1i: 2.8, d1p: [100, 200,  50], d1c: 0xffeecc,
                             d2i: 0.3, d2p: [-80, -40, -60], d2c: 0x223399, hemi: 0.15 },
    };

    function applyLightPreset(name) {
      const p = LIGHT_PRESETS[name];
      if (!p) return;
      ambientLight.intensity = p.amb;
      dir1.intensity = p.d1i;
      dir1.color.setHex(p.d1c);
      dir1.position.set(...p.d1p);
      dir2.intensity = p.d2i;
      dir2.color.setHex(p.d2c);
      dir2.position.set(...p.d2p);
      hemiLight.intensity = p.hemi;
      // Atualiza botão ativo
      document.querySelectorAll('.tb-light').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById(`lp-${name}`);
      if (btn) btn.classList.add('active');
    }

    // ── Grid & Eixos ────────────────────────────────────────────────────────
    const gridHelper = new THREE.GridHelper(300, 30, 0x1a2040, 0x141a30);
    scene.add(gridHelper);

    const axesHelper = new THREE.AxesHelper(20);
    scene.add(axesHelper);

    // ── Controles orbitais ──────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping    = true;
    controls.dampingFactor    = 0.06;
    controls.minDistance      = 1;
    controls.maxDistance      = 2000;
    controls.enablePan        = true;
    controls.screenSpacePanning = true;

    // ── Estado da cena ──────────────────────────────────────────────────────
    let currentObject  = null;
    let isWireframe    = false;
    let initialCamPos  = new THREE.Vector3();
    let initialTarget  = new THREE.Vector3();
    let modelMaterial  = null;

    // ── Material padrão ─────────────────────────────────────────────────────
    function _buildMaterial() {
      return new THREE.MeshStandardMaterial({
        color:     0x4fc3f7,
        roughness: 0.55,
        metalness: 0.05,
        side:      THREE.DoubleSide,
      });
    }

    // ── Ajuste de câmera ao modelo ───────────────────────────────────────────
    function fitToView(object) {
      const box    = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      const fov    = camera.fov * (Math.PI / 180);
      let   dist   = (maxDim / 2) / Math.tan(fov / 2);
      dist *= 1.6;

      camera.position.set(
        center.x + dist * 0.8,
        center.y + dist * 0.7,
        center.z + dist * 0.8
      );
      controls.target.copy(center);
      controls.update();

      initialCamPos.copy(camera.position);
      initialTarget.copy(center);

      gridHelper.position.y = box.min.y - 0.1;

      // Atualiza painel de dimensões
      document.getElementById('dim-x').textContent = size.x.toFixed(1);
      document.getElementById('dim-y').textContent = size.y.toFixed(1);
      document.getElementById('dim-z').textContent = size.z.toFixed(1);
      dimsPanel.style.display = 'block';
    }

    // ── Carregamento de modelos ──────────────────────────────────────────────
    function loadModel(url) {
      placeholder.style.display = 'none';
      errorEl.style.display     = 'none';
      loadingEl.style.display   = 'block';

      // Remove objeto anterior
      if (currentObject) {
        scene.remove(currentObject);
        currentObject.traverse(c => {
          if (c.isMesh) {
            c.geometry?.dispose();
            c.material?.dispose();
          }
        });
        currentObject = null;
      }

      const nameOnly = url.split('/').pop().split('?')[0];
      modelNameEl.textContent = nameOnly;

      const ext = nameOnly.split('.').pop().toLowerCase();

      function onError(err) {
        console.error(err);
        loadingEl.style.display = 'none';
        errorEl.style.display   = 'block';
        errorEl.textContent     = `❌ Falha ao carregar .${ext}`;
        dimsPanel.style.display = 'none';
      }

      if (ext === 'stl') {
        const loader = new STLLoader();
        loader.load(
          url,
          (geometry) => {
            geometry.computeVertexNormals();
            modelMaterial = _buildMaterial();
            const mesh = new THREE.Mesh(geometry, modelMaterial);
            mesh.castShadow    = true;
            mesh.receiveShadow = true;
            // STL do trimesh exporta com Z para cima (certo), mas rotaciona por
            // convenção Three.js que usa Y-up
            mesh.rotation.x = -Math.PI / 2;

            scene.add(mesh);
            currentObject = mesh;
            fitToView(mesh);
            loadingEl.style.display = 'none';
          },
          undefined,
          onError
        );

      } else if (ext === '3mf') {
        const loader = new ThreeMFLoader();
        loader.load(
          url,
          (group) => {
            modelMaterial = _buildMaterial();
            group.traverse((child) => {
              if (child.isMesh) {
                child.geometry.computeVertexNormals();
                child.material      = modelMaterial;
                child.castShadow    = true;
                child.receiveShadow = true;
              }
            });

            scene.add(group);
            currentObject = group;
            fitToView(group);
            loadingEl.style.display = 'none';
          },
          undefined,
          onError
        );

      } else {
        loadingEl.style.display = 'none';
        errorEl.textContent     = `❌ Formato não suportado: .${ext}`;
        errorEl.style.display   = 'block';
      }
    }

    // ── Toolbar ─────────────────────────────────────────────────────────────
    document.getElementById('btn-reset').addEventListener('click', () => {
      camera.position.copy(initialCamPos);
      controls.target.copy(initialTarget);
      controls.update();
    });

    document.getElementById('btn-wire').addEventListener('click', () => {
      isWireframe = !isWireframe;
      if (currentObject) {
        currentObject.traverse(c => {
          if (c.isMesh && c.material) {
            c.material.wireframe = isWireframe;
          }
        });
      }
      document.getElementById('btn-wire').textContent =
        isWireframe ? '◼ Sólido' : '◻ Wireframe';
    });

    document.getElementById('btn-top').addEventListener('click', () => {
      const box    = new THREE.Box3().setFromObject(currentObject || gridHelper);
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const dist   = Math.max(size.x, size.z) * 1.4;
      camera.position.set(center.x, center.y + dist, center.z + 0.01);
      controls.target.copy(center);
      controls.update();
    });

    document.getElementById('btn-front').addEventListener('click', () => {
      const box    = new THREE.Box3().setFromObject(currentObject || gridHelper);
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const dist   = Math.max(size.x, size.y) * 1.5;
      camera.position.set(center.x, center.y, center.z + dist);
      controls.target.copy(center);
      controls.update();
    });

    ['padrao', 'studio', 'rasante', 'dramatico'].forEach(name => {
      document.getElementById(`lp-${name}`)?.addEventListener('click', () => applyLightPreset(name));
    });

    // ── Tela cheia ─────────────────────────────────────────────────────────
    const btnFs = document.getElementById('btn-fs');
    btnFs.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    });

    document.addEventListener('fullscreenchange', () => {
      const isFs = !!document.fullscreenElement;
      btnFs.textContent = isFs ? '⤡ Sair da tela cheia' : '⤢ Tela cheia';
      btnFs.classList.toggle('active', isFs);
      // Atualiza renderer após mudança de tamanho
      setTimeout(() => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }, 100);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      }
    });

    // ── Comunicação via postMessage (página pai → iframe) ────────────────────
    window.addEventListener('message', (event) => {
      if (event.data?.type === 'loadModel') {
        loadModel(event.data.url);
      }
    });

    // ── Carrega modelo via query string: ?file=/output/modelo.3mf ───────────
    const params  = new URLSearchParams(window.location.search);
    const fileUrl = params.get('file');
    if (fileUrl) {
      loadModel(fileUrl);
    }

    // ── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Loop de renderização ─────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
