site_name: Glifo Análise
site_description: Análise de viabilidade tátil para dispositivo matricial — fonte ELIS
site_author: Maxwell Amairal do Nascimento
site_url: https://maxwellamaral.github.io/glifo-analise/
repo_url: https://github.com/maxwellamaral/glifo-analise
repo_name: maxwellamaral/glifo-analise
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: pt-BR
  logo: assets/icon.svg
  favicon: assets/icon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Alternar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Alternar para modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

nav:
  - Início: index.md
  - Especificações:
      - Requisitos: specs/requisitos.md
      - Arquitetura: specs/arquitetura.md
      - Roadmap: specs/roadmap.md
  - Galeria de Glifos: glifos.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang: pt
  - include-markdown

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maxwellamaral/glifo-analise
  generator: false

copyright: >
  Copyright &copy; 2024–2026 Maxwell Amairal do Nascimento —
  <a href="https://github.com/maxwellamaral/glifo-analise/blob/main/LICENSE">Licença MIT</a>
